name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync

      # test_parity.py is skipped in CI: it requires ROUST_PARITY_REPO to
      # point at a real multi-hundred-file repo checkout and diffs the
      # Rust/Python pipelines against lab/lanes2.py on it. That full parity
      # gate (300/300 SWE-bench Lite tasks via parity/harness.py) runs
      # locally / nightly, not on every push -- it's too slow and needs a
      # repo fixture that isn't checked into this repo.
      - name: Run pytest (excluding parity)
        run: uv run pytest tests/ -k "not parity"

  rust-tests:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: roust-rs
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: roust-rs

      - name: cargo test
        run: cargo test

      - name: cargo build --release
        run: cargo build --release
